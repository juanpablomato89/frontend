<header class="navbar">
  <a routerLink="/" class="brand">🍰 Que Dulce</a>

  <nav class="nav-links">
    <a routerLink="/catalog" routerLinkActive="active">Catalogo</a>
    <a routerLink="/cart" routerLinkActive="active" class="cart-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="cart-badge" *ngIf="cart.totalItems() > 0" [attr.aria-label]="cart.totalItems() + ' items en el carrito'">
        {{ cart.totalItems() }}
      </span>
    </a>

    <ng-container *ngIf="auth.isAuthenticated(); else guestLinks">
      <a routerLink="/orders" routerLinkActive="active">Mis pedidos</a>
      <a *ngIf="auth.currentUser()?.rol === 'Propietario'" routerLink="/dashboard" routerLinkActive="active">Mi tienda</a>
      <a *ngIf="auth.currentUser()?.rol === 'Admin'" routerLink="/admin" routerLinkActive="active">Admin</a>
      <a routerLink="/profile" routerLinkActive="active">{{ auth.currentUser()?.nombre }}</a>
      <button class="btn-logout" (click)="logout()">Salir</button>
    </ng-container>

    <ng-template #guestLinks>
      <a routerLink="/auth/login" class="btn-login">Entrar</a>
    </ng-template>
  </nav>
</header>

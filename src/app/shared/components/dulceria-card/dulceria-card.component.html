<article class="dulceria-card" [routerLink]="['/catalog', dulceria.id]" role="link" tabindex="0"
  (keydown.enter)="null" [attr.aria-label]="'Ver dulceria ' + dulceria.nombre">

  <div class="card-image-wrapper">
    <img
      [src]="dulceria.fotoPerfilUrl || 'assets/images/dulceria-placeholder.webp'"
      [alt]="dulceria.nombre"
      class="card-image"
      loading="lazy"
      width="400" height="240"
    />
    <span class="badge-delivery" *ngIf="dulceria.tieneDelivery">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
        <rect x="9" y="11" width="14" height="10" rx="2"/>
        <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      </svg>
      Delivery
    </span>
  </div>

  <div class="card-body">
    <h3 class="card-title">{{ dulceria.nombre }}</h3>
    <p class="card-location">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
      {{ dulceria.municipio }}, {{ dulceria.provincia }}
    </p>
    <p class="card-desc" *ngIf="dulceria.descripcion">{{ dulceria.descripcion }}</p>
    <div class="card-footer">
      <span class="delivery-range" *ngIf="dulceria.tieneDelivery && dulceria.radioDeliveryKm">
        hasta {{ dulceria.radioDeliveryKm }} km
      </span>
      <span class="btn-ver">Ver productos &rarr;</span>
    </div>
  </div>
</article>

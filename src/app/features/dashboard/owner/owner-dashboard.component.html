<div class="dashboard-shell">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/>
        <line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
      <span class="brand-name">Que Dulce</span>
    </div>

    <div class="dulceria-badge" *ngIf="dulceria()">
      <div class="dulceria-avatar">
        <img *ngIf="dulceria()!.fotoPerfilUrl" [src]="dulceria()!.fotoPerfilUrl" [alt]="dulceria()!.nombre" loading="lazy" />
        <span *ngIf="!dulceria()!.fotoPerfilUrl">{{ dulceria()!.nombre[0] }}</span>
      </div>
      <div class="dulceria-info">
        <p class="dulceria-name">{{ dulceria()!.nombre }}</p>
        <span class="status-dot" [class.active]="dulceria()!.estaActiva">
          {{ dulceria()!.estaActiva ? 'Activa' : 'Inactiva' }}
        </span>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="Navegación del panel">
      <a class="nav-item" *ngFor="let item of navItems"
         [routerLink]="item.path" routerLinkActive="active"
         [attr.aria-label]="item.label">
        <ng-container [ngSwitch]="item.icon">
          <svg *ngSwitchCase="'overview'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          <svg *ngSwitchCase="'pedidos'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <svg *ngSwitchCase="'productos'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          <svg *ngSwitchCase="'dulceria'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </ng-container>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ user?.nombre?.[0] }}</div>
        <div class="user-meta">
          <p class="user-name">{{ user?.nombre }}</p>
          <p class="user-email">{{ user?.email }}</p>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()" aria-label="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ── Main content ────────────────────────────────── -->
  <main class="main-content" id="main-content">
    <router-outlet />
  </main>

</div>

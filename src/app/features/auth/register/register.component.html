<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Que Dulce</h1>
      <p class="auth-subtitle">Crea tu cuenta</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="nombre">Nombre completo</label>
        <input id="nombre" type="text" formControlName="nombre" autocomplete="name" placeholder="Tu nombre" />
        <span class="error" *ngIf="f['nombre'].invalid && f['nombre'].touched">Nombre requerido (max 150 chars).</span>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" placeholder="tu@email.com" />
        <span class="error" *ngIf="f['email'].invalid && f['email'].touched">Email invalido.</span>
      </div>

      <div class="field">
        <label for="password">Contrasena</label>
        <input id="password" type="password" formControlName="password" autocomplete="new-password" placeholder="Min 8 caracteres" />
        <span class="error" *ngIf="f['password'].hasError('minlength') && f['password'].touched">Minimo 8 caracteres.</span>
        <span class="error" *ngIf="f['password'].hasError('noUppercase') && f['password'].touched">Debe tener al menos una mayuscula.</span>
        <span class="error" *ngIf="f['password'].hasError('noNumber') && f['password'].touched">Debe tener al menos un numero.</span>
      </div>

      <div class="field">
        <label>Tipo de cuenta</label>
        <div class="radio-group">
          <label class="radio-option" [class.selected]="f['rol'].value === 'Cliente'">
            <input type="radio" formControlName="rol" value="Cliente" />
            <span>Cliente</span>
          </label>
          <label class="radio-option" [class.selected]="f['rol'].value === 'Dulceria'">
            <input type="radio" formControlName="rol" value="Dulceria" />
            <span>Propietario de dulcería</span>
          </label>
        </div>
      </div>

      <p class="error server-error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
        {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
      </button>
    </form>

    <p class="auth-link">
      ¿Ya tienes cuenta? <a routerLink="/auth/login">Iniciar sesion</a>
    </p>
  </div>
</div>

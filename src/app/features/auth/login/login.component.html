<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Que Dulce</h1>
      <p class="auth-subtitle">Inicia sesion en tu cuenta</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tu@email.com"
        />
        <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Ingresa un email valido.
        </span>
      </div>

      <div class="field">
        <label for="password">Contrasena</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Tu contrasena"
        />
        <span class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          La contrasena es requerida.
        </span>
      </div>

      <p class="error server-error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-link">
      ¿No tienes cuenta? <a routerLink="/auth/register">Registrate</a>
    </p>
  </div>
</div>

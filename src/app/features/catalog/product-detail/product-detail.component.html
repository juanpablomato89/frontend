<div class="detail-page">

  <!-- Loading -->
  <div class="skeleton-header" *ngIf="loading()" aria-busy="true" aria-label="Cargando dulcería"></div>

  <!-- Error -->
  <div class="error-state" *ngIf="!loading() && error()" role="alert">
    <p>{{ error() }}</p>
  </div>

  <ng-container *ngIf="!loading() && dulceria() as d">

    <!-- Cabecera de dulcería -->
    <section class="dulceria-header">
      <div class="header-image-wrapper">
        <img
          [src]="d.fotoPerfilUrl || 'assets/images/dulceria-placeholder.webp'"
          [alt]="d.nombre"
          class="header-image"
          width="800" height="300"
        />
      </div>
      <div class="header-info">
        <h1 class="header-title">{{ d.nombre }}</h1>
        <p class="header-location">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          {{ d.municipio }}, {{ d.provincia }} &mdash; {{ d.direccionTexto }}
        </p>
        <p class="header-desc" *ngIf="d.descripcion">{{ d.descripcion }}</p>
        <div class="header-badges">
          <span class="badge-delivery" *ngIf="d.tieneDelivery">
            Delivery hasta {{ d.radioDeliveryKm }} km
          </span>
          <a [href]="'https://wa.me/' + d.telefonoContacto" target="_blank" rel="noopener noreferrer" class="badge-whatsapp">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
            </svg>
            WhatsApp
          </a>
        </div>
      </div>
    </section>

    <!-- Toast de confirmación -->
    <div class="toast-added" role="status" aria-live="polite" *ngIf="addedProductId()">
      ¡Agregado al carrito!
    </div>

    <!-- Productos -->
    <section class="productos-section">
      <h2 class="section-title">Productos disponibles</h2>

      <div class="productos-empty" *ngIf="productos.length === 0">
        <p>Esta dulcería aún no tiene productos publicados.</p>
      </div>

      <div class="productos-grid" *ngIf="productos.length > 0" role="list">
        <app-product-card
          *ngFor="let p of productos; trackBy: trackByProducto"
          [producto]="p"
          (addToCart)="addToCart($event)"
          role="listitem"
        />
      </div>
    </section>

  </ng-container>

</div>
